<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pokedex{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #ffffff !important; }
        .banner-pokemon {
            background-color: #0a285f;
            border-bottom: 4px solid #ffcb05;
            padding: 30px 20px;
        }
        .banner-logo { max-height: 80px; object-fit: contain; }
        .image-container {
            width: 100%; height: 220px; display: flex; align-items: center;
            justify-content: center; background-color: #fdfdfd; overflow: hidden;
        }
        .image-container img {
            max-width: 100%; max-height: 100%; object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="banner-pokemon text-center mb-5 shadow-sm">
        <a href="{% url 'pokedex:index' %}">
            <img src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pok%C3%A9mon_logo.svg" alt="Logo" class="banner-logo">
        </a>
        <div class="mt-3">
            {% if user.is_authenticated %}
                <span class="text-white me-3">Hola, {{ user.username }}</span>
                <a href="{% url 'pokedex:logout' %}" class="btn btn-outline-light btn-sm">Cerrar sesión</a>
            {% else %}
                <a href="{% url 'pokedex:login' %}" class="btn btn-light btn-sm">Iniciar sesión</a>
                <a href="{% url 'pokedex:register' %}" class="btn btn-warning btn-sm">Registrarse</a>
            {% endif %}
        </div>
    </div>

    <div class="container mb-5" style="max-width: 1200px;">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
