{% extends 'base.html' %}

{% block title %}Iniciar sesión{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm p-4">
                <h1 class="h3 mb-4 fw-bold">Log in</h1>
                
                <form method="post" novalidate>
                    {% csrf_token %}
                    
                    {# Renderizado directo de los campos del formulario #}
                    <div class="mb-3">
                        <label for="{{ form.username.id_for_label }}" class="form-label">Usuario</label>
                        {{ form.username }}
                        <div class="text-danger small">{{ form.username.errors }}</div>
                    </div>

                    <div class="mb-3">
                        <label for="{{ form.password.id_for_label }}" class="form-label">Contraseña</label>
                        {{ form.password }}
                        <div class="text-danger small">{{ form.password.errors }}</div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Log in</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
