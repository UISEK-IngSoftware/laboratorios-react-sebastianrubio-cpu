<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Entrenador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>
        body {
            background-color: #ffffff !important;
        }
        .banner-pokemon {
            background-color: #0a285f;
            border-bottom: 4px solid #ffcb05;
            padding: 25px 20px;
        }
        .banner-title {
            color: #ffcb05;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 3px 3px 0px #1d4ed8;
            margin: 0;
            font-family: 'Arial Black', sans-serif;
        }
        .preview-container {
            max-width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fdfdfd;
        }
        .preview-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>
    
    <div class="banner-pokemon text-center mb-5 shadow-sm">
        <h1 class="banner-title">Mi Pokedex</h1>
    </div>

    <div class="container mb-5" style="max-width: 600px;">
        <div class="card p-4 border rounded shadow-sm bg-white">
            <h2 class="h4 text-dark border-bottom pb-2 mb-4 fw-bold">Modificar Ficha de Entrenador</h2>
            
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">Nombre (First Name)</label>
                    <input type="text" name="first_name" class="form-control" value="{{ trainer.first_name }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">Apellido (Last Name)</label>
                    <input type="text" name="last_name" class="form-control" value="{{ trainer.last_name }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">Fecha de Nacimiento</label>
                    <input type="date" name="birth_date" class="form-control" value="{{ trainer.birth_date|date:'Y-m-d' }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">Nivel</label>
                    <input type="number" name="level" class="form-control" value="{{ trainer.level }}" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">Región de Origen</label>
                    <select name="region" class="form-select" required>
                        <option value="K" {% if trainer.region == 'K' %}selected{% endif %}>Kanto</option>
                        <option value="J" {% if trainer.region == 'J' %}selected{% endif %}>Johto</option>
                        <option value="H" {% if trainer.region == 'H' %}selected{% endif %}>Hoenn</option>
                        <option value="S" {% if trainer.region == 'S' %}selected{% endif %}>Sinnoh</option>
                        <option value="U" {% if trainer.region == 'U' %}selected{% endif %}>Unova</option>
                        <option value="KA" {% if trainer.region == 'KA' %}selected{% endif %}>Kalos</option>
                        <option value="A" {% if trainer.region == 'A' %}selected{% endif %}>Alola</option>
                        <option value="G" {% if trainer.region == 'G' %}selected{% endif %}>Galar</option>
                        <option value="P" {% if trainer.region == 'P' %}selected{% endif %}>Paldea</option>
                        <option value="NA" {% if trainer.region == 'NA' %}selected{% endif %}>No Definida</option>
                    </select>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary">Fotografía / Avatar</label>
                    {% if trainer.picture %}
                        <div class="mb-3 p-2 border rounded preview-container mx-auto">
                            <img src="{{ trainer.picture.url }}" alt="Avatar actual">
                        </div>
                    {% endif %}
                    <input type="file" name="picture" class="form-control" accept=".png, .jpg, .jpeg">
                    <div class="form-text">Suba un archivo nuevo solo si desea reemplazar la foto actual.</div>
                </div>
                
                <div class="d-flex justify-content-between border-top pt-3">
                    <a href="{% url 'pokedex:index' %}" class="btn btn-outline-secondary px-4">Cancelar</a>
                    <button type="submit" class="btn btn-primary px-4" style="background-color: #0a285f; border-color: #0a285f;">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
