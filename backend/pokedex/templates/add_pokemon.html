{% extends 'base.html' %}

{% block title %}Registrar Nuevo Espécimen{% endblock %}

{% block content %}
<div class="container mt-5" style="max-width: 600px;">
    <div class="card shadow-sm border-0 bg-dark text-white p-4">
        <h2 class="mb-4 text-uppercase font-monospace text-info">[ Registrar Pokémon ]</h2>
        
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="name" class="form-label font-monospace text-secondary">Nombre del Pokémon *</label>
                <input type="text" class="form-control bg-secondary text-white border-0" id="name" name="name" required placeholder="Ej. Bulbasaur">
            </div>
            
            <div class="mb-3">
                <label for="type" class="form-label font-monospace text-secondary">Tipo Elemental *</label>
                <select class="form-select bg-secondary text-white border-0" id="type" name="type" required>
                    <option value="" disabled selected>Selecciona un tipo...</option>
                    {% for code, name in pokemon_types %}
                        <option value="{{ code }}">{{ name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="weight" class="form-label font-monospace text-secondary">Peso (kg) *</label>
                    <input type="number" step="0.01" class="form-control bg-secondary text-white border-0" id="weight" name="weight" required placeholder="0.00">
                </div>
                
                <div class="col-md-6 mb-3">
                    <label for="height" class="form-label font-monospace text-secondary">Altura (m) *</label>
                    <input type="number" step="0.01" class="form-control bg-secondary text-white border-0" id="height" name="height" required placeholder="0.00">
                </div>
            </div>
            
            <div class="mb-3">
                <label for="trainer" class="form-label font-monospace text-secondary">Entrenador Asignado (Opcional)</label>
                <select class="form-select bg-secondary text-white border-0" id="trainer" name="trainer">
                    <option value="" selected>Sin Entrenador Asignado</option>
                    {% for trainer in trainers %}
                        <option value="{{ trainer.id }}">{{ trainer.first_name }} {{ trainer.last_name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="mb-4">
                <label for="picture" class="form-label font-monospace text-secondary">Fotografía de Registro (.png, .jpg, .jpeg)</label>
                <input type="file" class="form-control bg-secondary text-white border-0" id="picture" name="picture" accept="image/*">
            </div>
            
            <div class="d-flex justify-content-between align-items-center">
                <a href="{% url 'pokedex:index' %}" class="btn btn-outline-light font-monospace">Volver</a>
                <button type="submit" class="btn btn-success px-4 font-monospace fw-bold">Guardar en Base de Datos</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
